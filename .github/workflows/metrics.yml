name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Core Engineering Analytics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: jeetkarena
          template: classic
          filename: github-metrics.svg
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          config_display: large

          # Language Distribution Matrix
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage

          # Time Allocation Matrix
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Domain Specializations
          plugin_topics: yes
          plugin_topics_limit: 50
          plugin_topics_mode: mastered

          # Algorithmic Engineering Track
          plugin_leetcode: yes
          plugin_leetcode_user: jeetkarena3
          plugin_leetcode_sections: solved, skills, recent
          plugin_leetcode_limit_skills: 10
          plugin_leetcode_limit_recent: 5

          output_action: commit
          committer_branch: main
          committer_message: "analytics: engine state update"

      - name: Engineering Recognition & Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: jeetkarena
          template: classic
          filename: metrics-achievements.svg
          base: ""

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes

          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          output_action: commit
          committer_branch: main
          committer_message: "analytics: achievement state update"
